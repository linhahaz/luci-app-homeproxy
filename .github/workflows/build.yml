name: Build luci-app-homeproxy
on:
  workflow_dispatch:
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
  PACKAGE_NAME: luci-app-homeproxy
  PACKAGE_VERSION: '1.12.171'
  SDK_URL: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR: openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64
  REPO_URL: https://github.com/immortalwrt/homeproxy.git
  REPO_BRANCH: master

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download SDK
        run: |
          wget -q "${{ env.SDK_URL }}" -O sdk.tar.zst
          tar -xf sdk.tar.zst -C ~
          mv ~/${{ env.SDK_DIR }} ~/openwrt
          rm sdk.tar.zst

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file gawk gettext git \
            libelf-dev libncurses5-dev libncursesw5-dev libssl-dev python3 python3-pip \
            rsync subversion unzip wget xsltproc zip zlib1g-dev

      - name: Add Feeds & Clone Source
        run: |
          cd ~/openwrt
          echo "src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/custom
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} package/custom/homeproxy

      - name: Configure
        run: |
          cd ~/openwrt
          {
            echo "CONFIG_TARGET_x86=y"
            echo "CONFIG_TARGET_x86_64=y"
            echo "CONFIG_PACKAGE_luci-app-homeproxy=y"
            echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y"
            echo "CONFIG_ALL_NONSHARED=n"
            echo "CONFIG_SIGNED_PACKAGES=n"
            echo "CONFIG_SIGNATURE_CHECK=n"
          } > .config
          make defconfig

      - name: Compile
        run: |
          cd ~/openwrt
          # 先尝试编译主包子目录，失败则回退到父目录
          make package/custom/homeproxy/luci-app-homeproxy/compile V=s -j$(nproc) || \
          make package/custom/homeproxy/compile V=s -j$(nproc)

      - name: Collect Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          # 收集所有 homeproxy 相关 apk
          find ~/openwrt/bin/packages/ -type f -name "*homeproxy*.apk" -exec cp -f {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          
          echo "=== All collected files ==="
          ls -lh $GITHUB_WORKSPACE/output/
          
          # 智能筛选：主包 = 含 luci-app-homeproxy 且 不含 i18n
          PKG_FILE=""
          for f in $GITHUB_WORKSPACE/output/*luci-app-homeproxy*.apk; do
            [ -f "$f" ] || continue
            echo "$f" | grep -q "i18n" && continue
            PKG_FILE="$f"
            break
          done
          
          # 中文包：含 i18n 且含 zh-cn
          I18N_FILE=""
          for f in $GITHUB_WORKSPACE/output/*luci-i18n-homeproxy-zh-cn*.apk; do
            [ -f "$f" ] && I18N_FILE="$f" && break
          done
          
          [ -n "$PKG_FILE" ] && echo "pkg_file=${PKG_FILE}" >> $GITHUB_ENV && echo "✓ Found main: $PKG_FILE"
          [ -n "$I18N_FILE" ] && echo "i18n_file=${I18N_FILE}" >> $GITHUB_ENV && echo "✓ Found i18n: $I18N_FILE"
          
          # 调试：若未找到主包，列出所有候选文件
          [ -z "$PKG_FILE" ] && {
            echo "⚠ WARNING: main apk not found, candidates:"
            ls -1 $GITHUB_WORKSPACE/output/*.apk 2>/dev/null || echo "  (no .apk files)"
          }

      - name: Create Release
        if: success()
        run: |
          PKG_FILE="${{ env.pkg_file }}"
          I18N_FILE="${{ env.i18n_file }}"
          
          if [ -z "$PKG_FILE" ] || [ ! -f "$PKG_FILE" ]; then
            echo "❌ ERROR: main apk not found"
            echo "Available files in output:"
            ls -la $GITHUB_WORKSPACE/output/ 2>/dev/null || echo "(empty)"
            exit 1
          fi
          
          PKG_NAME=$(basename "$PKG_FILE")
          I18N_NAME=""
          [ -n "$I18N_FILE" ] && [ -f "$I18N_FILE" ] && I18N_NAME=$(basename "$I18N_FILE")
          
          # 生成 Release 正文（使用 printf 避免 heredoc 解析问题）
          printf '%s\n' \
            "## luci-app-homeproxy v${{ env.PACKAGE_VERSION }}" \
            "" \
            "**Firmware:** OpenWrt 25.12.2" \
            "**Arch:** x86/64" \
            "**Package:** \`${PKG_NAME}\`" \
            "$([ -n "$I18N_NAME" ] && echo "**中文包:** \`${I18N_NAME}\`")" \
            "" \
            "### 安装命令" \
            "" \
            '```bash' \
            "apk add --allow-untrusted /tmp/${PKG_NAME}" \
            "$([ -n "$I18N_NAME" ] && echo "apk add --allow-untrusted /tmp/${I18N_NAME}")" \
            "" \
            "rm -f /tmp/luci-indexcache.*" \
            "/etc/init.d/rpcd reload" \
            '```' \
            "" \
            "或通过 LuCI 后台上传安装。" \
            > /tmp/release_body.txt
          
          # 构建上传参数
          UPLOAD_FILES="$PKG_FILE"
          [ -n "$I18N_FILE" ] && [ -f "$I18N_FILE" ] && UPLOAD_FILES="$UPLOAD_FILES $I18N_FILE"
          
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "luci-app-homeproxy v${{ env.PACKAGE_VERSION }}" \
            --notes-file /tmp/release_body.txt \
            -- $UPLOAD_FILES
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup SDK
        run: |
          rm -rf ~/openwrt
          echo "SDK cleaned"

      - name: Cleanup Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
          repo: ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
