name: Build luci-app-homeproxy
on:
  workflow_dispatch:
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
  PACKAGE_NAME: luci-app-homeproxy
  PACKAGE_VERSION: '1.12.171'                     # ← 请根据 releases 页更新
  SDK_URL: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR: openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64
  REPO_URL: https://github.com/immortalwrt/homeproxy.git
  REPO_BRANCH: master

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download SDK
        run: |
          wget -q "${{ env.SDK_URL }}" -O sdk.tar.zst
          tar -xf sdk.tar.zst -C ~
          mv ~/${{ env.SDK_DIR }} ~/openwrt
          rm sdk.tar.zst

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file gawk gettext git \
            libelf-dev libncurses5-dev libncursesw5-dev libssl-dev python3 python3-pip \
            rsync subversion unzip wget xsltproc zip zlib1g-dev

      - name: Add Feeds & Clone Source
        run: |
          cd ~/openwrt
          # 添加 immortalwrt feeds 确保能解析到最新依赖
          echo "src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          mkdir -p package/custom
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} package/custom/homeproxy

      - name: Configure
        run: |
          cd ~/openwrt
          cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_PACKAGE_luci-app-homeproxy=y
# CONFIG_PACKAGE_sing-box is not set          ← 官方源已有，apk add 时会自动拉取，无需重复编译
CONFIG_ALL_NONSHARED=n
CONFIG_SIGNED_PACKAGES=n
CONFIG_SIGNATURE_CHECK=n
EOF
          make defconfig

      - name: Compile
        run: |
          cd ~/openwrt
          make package/custom/homeproxy/compile V=s -j$(nproc)

      - name: Collect Artifacts
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find ~/openwrt/bin/packages/ -type f \
            -name "*luci-app-homeproxy*.apk" \
            -exec cp -f {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          echo "=== output ==="
          ls -lh $GITHUB_WORKSPACE/output/
          PKG_FILE=$(ls $GITHUB_WORKSPACE/output/*.apk 2>/dev/null | head -1)
          if [ -n "$PKG_FILE" ]; then
            echo "pkg_file=${PKG_FILE}" >> $GITHUB_ENV
          fi

      - name: Create Release
        if: success() && env.pkg_file != ''
        run: |
          PKG_FILE="${{ env.pkg_file }}"
          [ -f "$PKG_FILE" ] || { echo "ERROR: no .apk found"; exit 1; }
          PKG_NAME=$(basename "$PKG_FILE")

          tee /tmp/release_body.txt << EOF
## luci-app-homeproxy v${{ env.PACKAGE_VERSION }}

**Firmware:** OpenWrt 25.12.2  
**Arch:** x86/64  
**Package:** \`${PKG_NAME}\`

### 安装命令
\`\`\`bash
# 在线安装（自动拉取 sing-box 等依赖）
apk add luci-app-homeproxy

# 或离线安装（需确保系统已预装 sing-box/firewall4/kmod-nft-tproxy）
apk add --allow-untrusted /tmp/${PKG_NAME}

rm -f /tmp/luci-indexcache.*
/etc/init.d/rpcd reload
\`\`\`

> 💡 官方 OpenWrt 25.12 软件源已包含兼容版 `sing-box`，`apk add` 会自动处理依赖。
EOF

          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "luci-app-homeproxy v${{ env.PACKAGE_VERSION }}" \
            --notes-file /tmp/release_body.txt \
            -- "$PKG_FILE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup SDK
        run: rm -rf ~/openwrt && echo "SDK cleaned"

      - name: Cleanup Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
          repo: ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
