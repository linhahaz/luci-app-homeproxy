name: Build luci-app-homeproxy
on:
  workflow_dispatch:
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
  PACKAGE_NAME: luci-app-homeproxy
  PACKAGE_VERSION: '26.071.13677~ec92da1'
  SDK_URL: https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR: openwrt-sdk-25.12.2-x86-64_gcc-14.3.0_musl.Linux-x86_64
  REPO_URL: https://github.com/VIKINGYFY/homeproxy.git
  REPO_BRANCH: master

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download SDK
        run: |
          wget -q "${{ env.SDK_URL }}" -O sdk.tar.zst
          tar -xf sdk.tar.zst -C ~
          mv ~/${{ env.SDK_DIR }} ~/openwrt
          rm sdk.tar.zst

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file gawk gettext git \
            libelf-dev libncurses5-dev libncursesw5-dev libssl-dev python3 python3-pip \
            rsync subversion unzip wget xsltproc zip zlib1g-dev

      - name: Add Feeds & Clone Source
        run: |
          cd ~/openwrt
          echo "src-git immortalwrt_pkgs https://github.com/immortalwrt/packages.git;openwrt-25.12" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/custom
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} package/custom/homeproxy

      - name: Configure
        run: |
          cd ~/openwrt
          {
            echo "CONFIG_TARGET_x86=y"
            echo "CONFIG_TARGET_x86_64=y"
            echo "CONFIG_PACKAGE_luci-app-homeproxy=y"
            echo "CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y"
            echo "CONFIG_ALL_NONSHARED=n"
            echo "CONFIG_SIGNED_PACKAGES=n"
            echo "CONFIG_SIGNATURE_CHECK=n"
          } > .config
          make defconfig

      - name: Compile
        run: |
          cd ~/openwrt
          make package/custom/homeproxy/luci-app-homeproxy/compile V=s -j$(nproc) || \
          make package/custom/homeproxy/compile V=s -j$(nproc)

      - name: Collect Artifacts
        id: collect
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          find ~/openwrt/bin/packages/ -type f -name "*homeproxy*.apk" -exec cp -f {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
          
          echo "=== Collected files ==="
          ls -lh $GITHUB_WORKSPACE/output/
          
          # 使用 outputs 传递文件路径（比 $GITHUB_ENV 更可靠）
          MAIN_FILE=""
          I18N_FILE=""
          for f in $GITHUB_WORKSPACE/output/*.apk; do
            [ -f "$f" ] || continue
            case "$(basename "$f")" in
              *luci-i18n-homeproxy-zh-cn*) I18N_FILE="$f" ;;
              *luci-app-homeproxy*) 
                [ -z "$MAIN_FILE" ] && MAIN_FILE="$f" 
                ;;
            esac
          done
          
          [ -n "$MAIN_FILE" ] && echo "main_file=$MAIN_FILE" >> $GITHUB_OUTPUT
          [ -n "$I18N_FILE" ] && echo "i18n_file=$I18N_FILE" >> $GITHUB_OUTPUT
          echo "main=$MAIN_FILE"
          echo "i18n=$I18N_FILE"

      - name: Create Release
        if: success() && steps.collect.outputs.main_file != ''
        run: |
          set -euo pipefail
          
          MAIN_FILE="${{ steps.collect.outputs.main_file }}"
          I18N_FILE="${{ steps.collect.outputs.i18n_file }}"
          
          # 使用 basename 获取纯文件名，避免路径解析问题
          MAIN_NAME=$(basename -- "$MAIN_FILE")
          I18N_NAME=""
          [ -n "$I18N_FILE" ] && [ -f "$I18N_FILE" ] && I18N_NAME=$(basename -- "$I18N_FILE")
          
          # 生成 Release 正文（使用纯 echo，避免 heredoc/printf 陷阱）
          {
            echo "## luci-app-homeproxy v${{ env.PACKAGE_VERSION }}"
            echo ""
            echo "**Firmware:** OpenWrt 25.12.2"
            echo "**Arch:** x86/64"
            echo "**Package:** \`$MAIN_NAME\`"
            [ -n "$I18N_NAME" ] && echo "**中文包:** \`$I18N_NAME\`"
            echo ""
            echo "### 安装命令"
            echo ""
            echo '```bash'
            echo "apk add --allow-untrusted /tmp/$MAIN_NAME"
            [ -n "$I18N_NAME" ] && echo "apk add --allow-untrusted /tmp/$I18N_NAME"
            echo ""
            echo "rm -f /tmp/luci-indexcache.*"
            echo "/etc/init.d/rpcd reload"
            echo '```'
            echo ""
            echo "或通过 LuCI 后台上传安装。"
          } > /tmp/release_body.txt
          
          # 上传文件：使用数组方式传递，避免空格/特殊字符问题
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          
          if [ -n "$I18N_NAME" ] && [ -f "$I18N_FILE" ]; then
            gh release create "${{ github.ref_name }}" \
              --title "luci-app-homeproxy v${{ env.PACKAGE_VERSION }}" \
              --notes-file /tmp/release_body.txt \
              -- "$MAIN_FILE" "$I18N_FILE"
          else
            gh release create "${{ github.ref_name }}" \
              --title "luci-app-homeproxy v${{ env.PACKAGE_VERSION }}" \
              --notes-file /tmp/release_body.txt \
              -- "$MAIN_FILE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup SDK
        run: |
          rm -rf ~/openwrt
          echo "SDK cleaned"

      - name: Cleanup Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
          repo: ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
